<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ✏️ EDIT: Change the page/tab title -->
<title>IoT Quiz</title>
<link rel="icon" type="image/png" href="iot.png"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .quiz-container { background: #1a1d27; border-radius: 16px; padding: 32px; max-width: 720px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 6px; }
  .header p { font-size: 0.85rem; color: #888; }
  .progress-bar-wrap { background: #2a2d3a; border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 8px; transition: width 0.4s ease; }
  .topic-select { display: flex; flex-direction: column; gap: 12px; }
  .topic-select-label { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 4px; }
  .topic-select-btn { background: #23273a; border: 2px solid #2e3248; border-radius: 10px; padding: 14px 20px; text-align: left; cursor: pointer; font-size: 0.95rem; color: #ccc; transition: all 0.2s ease; font-family: inherit; }
  .topic-select-btn:hover { border-color: #7c3aed; background: #2a2d3a; color: #fff; transform: translateX(3px); }
  .all-btn { background: linear-gradient(90deg, #7c3aed22, #a78bfa22); border-color: #7c3aed; color: #a78bfa; font-weight: 700; text-align: center; }
  .all-btn:hover { background: linear-gradient(90deg, #7c3aed, #6d28d9); color: #fff; transform: translateX(3px); }
  .topic-badge { display: inline-block; background: #2a2d3a; color: #a78bfa; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; letter-spacing: 0.5px; }
  .question-num { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
  .question-text { font-size: 1.05rem; font-weight: 600; color: #f0f0f0; line-height: 1.5; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #23273a; border: 2px solid #2e3248; border-radius: 10px; padding: 14px 18px; text-align: left; cursor: pointer; font-size: 0.95rem; color: #ccc; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; font-family: inherit; }
  .option-btn:hover:not(:disabled) { border-color: #7c3aed; background: #2a2d3a; color: #fff; transform: translateX(3px); }
  .option-btn .letter { font-weight: 700; color: #7c3aed; min-width: 22px; }
  .option-btn.correct { border-color: #22c55e; background: #052e16; color: #86efac; }
  .option-btn.correct .letter { color: #22c55e; }
  .option-btn.wrong { border-color: #ef4444; background: #2d0a0a; color: #fca5a5; }
  .option-btn.wrong .letter { color: #ef4444; }
  .option-btn.reveal { border-color: #22c55e; background: #052e16; color: #86efac; opacity: 0.7; }
  .option-btn:disabled { cursor: not-allowed; }
  .feedback { margin-top: 18px; padding: 14px 18px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.correct { background: #052e16; border: 1px solid #22c55e; color: #86efac; }
  .feedback.wrong { background: #2d0a0a; border: 1px solid #ef4444; color: #fca5a5; }
  .next-btn { margin-top: 20px; background: linear-gradient(90deg, #7c3aed, #6d28d9); color: white; border: none; padding: 13px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s; display: none; font-family: inherit; }
  .next-btn:hover { opacity: 0.88; }
  .score-card { text-align: center; padding: 20px 0; }
  .score-card h2 { font-size: 1.4rem; color: #a78bfa; margin-bottom: 12px; }
  .score-big { font-size: 3.5rem; font-weight: 800; color: #a78bfa; margin: 12px 0; }
  .score-label { font-size: 0.95rem; color: #888; margin-bottom: 20px; }
  .score-breakdown { background: #23273a; border-radius: 12px; padding: 18px; margin: 16px 0; text-align: left; }
  .score-breakdown h3 { color: #a78bfa; font-size: 0.9rem; margin-bottom: 12px; letter-spacing: 0.5px; }
  .topic-score { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #2e3248; font-size: 0.88rem; }
  .topic-score:last-child { border-bottom: none; }
  .topic-score .ts-name { color: #ccc; }
  .topic-score .ts-val { color: #a78bfa; font-weight: 700; }
  .restart-btn { background: #23273a; color: #a78bfa; border: 2px solid #7c3aed; padding: 12px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; transition: all 0.2s; font-family: inherit; }
  .restart-btn:hover { background: #7c3aed; color: white; }
  .stats-row { display: flex; justify-content: center; gap: 28px; margin: 16px 0; }
  .stat-box { background: #23273a; border-radius: 10px; padding: 12px 20px; text-align: center; }
  .stat-box .sv { font-size: 1.6rem; font-weight: 800; color: #a78bfa; }
  .stat-box .sl { font-size: 0.75rem; color: #888; margin-top: 2px; }
  /* ── Multi-select extras ── */
  .multi-badge { display: inline-block; background: #1e293b; color: #60a5fa; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; letter-spacing: 0.4px; border: 1px solid #2563eb55; }
  .option-btn.selected { border-color: #a78bfa; background: #2d2459; color: #e9d5ff; }
  .option-btn.selected .letter { color: #a78bfa; }
  .submit-btn { margin-top: 16px; background: #23273a; color: #a78bfa; border: 2px solid #7c3aed; padding: 12px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; font-family: inherit; }
  .submit-btn:hover:not(:disabled) { background: #7c3aed; color: white; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Type badges ── */
  .type-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; letter-spacing: 0.4px; }
  .multi-badge { background: #1e293b; color: #60a5fa; border: 1px solid #2563eb55; }
  .match-badge { background: #1e1a2e; color: #c084fc; border: 1px solid #7c3aed55; }
  .input-badge { background: #1a2e1e; color: #86efac; border: 1px solid #22c55e55; }

  /* ── Multi-select ── */
  .option-btn.selected { border-color: #a78bfa; background: #2d2459; color: #e9d5ff; }
  .option-btn.selected .letter { color: #a78bfa; }

  /* ── Submit button (shared by multi, match, input) ── */
  .submit-btn { margin-top: 16px; background: #23273a; color: #a78bfa; border: 2px solid #7c3aed; padding: 12px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; font-family: inherit; }
  .submit-btn:hover:not(:disabled) { background: #7c3aed; color: white; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Match layout ── */
  .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 4px; }
  .match-left { display: flex; flex-direction: column; gap: 10px; }
  .match-row { display: flex; align-items: center; gap: 10px; }
  .match-select { background: #23273a; border: 2px solid #2e3248; border-radius: 8px; color: #ccc; font-size: 0.9rem; padding: 8px 10px; cursor: pointer; font-family: inherit; min-width: 60px; transition: border-color 0.2s; }
  .match-select:focus { outline: none; border-color: #7c3aed; }
  .match-select:disabled { cursor: not-allowed; }
  .match-select.match-correct { border-color: #22c55e; background: #052e16; color: #86efac; }
  .match-select.match-wrong   { border-color: #ef4444; background: #2d0a0a; color: #fca5a5; }
  .match-term { font-size: 0.9rem; color: #e0e0e0; font-weight: 500; }
  .match-hint { font-size: 0.8rem; color: #22c55e; font-weight: 700; margin-left: 4px; }
  .match-right { display: flex; flex-direction: column; gap: 10px; }
  .match-desc-row { display: flex; align-items: flex-start; gap: 8px; font-size: 0.88rem; color: #bbb; line-height: 1.4; padding: 8px 0; border-bottom: 1px solid #2e3248; }
  .match-desc-row:last-child { border-bottom: none; }
  .match-num { color: #a78bfa; font-weight: 700; min-width: 20px; }
  @media (max-width: 540px) { .match-container { grid-template-columns: 1fr; } }

  /* ── Input answer ── */
  .input-wrap { margin-bottom: 4px; }
  .ans-input { width: 100%; background: #23273a; border: 2px solid #2e3248; border-radius: 10px; color: #f0f0f0; font-size: 1rem; padding: 13px 16px; font-family: inherit; transition: border-color 0.2s; }
  .ans-input:focus { outline: none; border-color: #7c3aed; }
  .ans-input:disabled { cursor: not-allowed; opacity: 0.7; }
  .ans-input.input-correct { border-color: #22c55e; background: #052e16; color: #86efac; }
  .ans-input.input-wrong   { border-color: #ef4444; background: #2d0a0a; color: #fca5a5; }
</style>
</head>
<body>
<div class="quiz-container">
  <div class="header">
    <!-- ✏️ EDIT: Quiz title and subtitle -->
    <h1>📚 IoT Quiz</h1>
    <p>i vibed this shit</p>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="quizBody"></div>
</div>

</html>
